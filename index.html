<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample Website with Checkboxes</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
      }

      .checkbox-group {
        display: grid;
        gap: 0.75rem;
        max-width: 300px;
      }

      label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1>Preferences</h1>
    <p>Please select your options:</p>

    <div class="checkbox-group">
      <label>
        <input type="checkbox" name="newsletter" />
        Subscribe to newsletter
      </label>

      <label>
        <input type="checkbox" name="notifications" />
        Enable notifications
      </label>
    </div>
  </body>
</html>
